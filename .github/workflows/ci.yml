name: CI

on:
  push:
    branches: [ main, fix/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=15 --max-line-length=120 --statistics --exclude=legacy,data,static

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libatlas-base-dev gfortran
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Generate perfume images (test data)
        run: python setup.py
        env:
          ADMIN_PASSWORD: ci-test
      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=70
        env:
          ADMIN_PASSWORD: ci-test

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t parfumai .
      - name: Smoke test — container starts
        run: |
          docker run -d -p 5000:5000 -e ADMIN_PASSWORD=ci-test --name parfumai_test parfumai
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:5000 | grep 200
          docker stop parfumai_test
