<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}ParfumAI — Kişisel Koku Analizi{% endblock %}</title>
    <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-neon fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-droplet me-2"></i>ParfumAI
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="/survey">Koku Analizi</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">Bilimsel Altyapı</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin" style="font-size:0.8rem;opacity:0.5;">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer class="footer-neon">
        <div class="container">
            <p class="mb-1">
                <i class="bi bi-droplet me-2" style="color:var(--neon-cyan);"></i>ParfumAI &mdash; Kokusal Zekanıza Bilimsel Bir Bakış
            </p>
            <p class="mb-0" style="font-size:0.75rem;">
                Limbik Sistem <span style="color:var(--neon-cyan);">&middot;</span> Amigdala <span style="color:var(--neon-magenta);">&middot;</span> Hipokampus <span style="color:var(--neon-gold);">&middot;</span> Olfaktor Bellek
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
