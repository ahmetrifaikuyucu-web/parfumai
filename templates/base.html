<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/static/vendor/manifest.json">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}ParfumAI — Kişisel Koku Analizi{% endblock %}</title>
    <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons.min.css') }}">
    <link href="https://fonts.googleapis.com/css?family=Cormorant:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-parfum fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-droplet me-2"></i>ParfumAI
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="/survey">Koku Analizi</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin" style="font-size:0.7rem;opacity:0.4;">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer class="footer-parfum">
        <div class="container">
            <p class="mb-1">
                <i class="bi bi-droplet me-2" style="color:var(--accent-cyan);"></i>ParfumAI &mdash; Kokusal Zekanıza Bilimsel Bir Bakış
            </p>
            <p class="mb-0" style="font-size:0.7rem;">
                <span style="color:var(--accent-cyan);">&copy;</span> 2026 Ahmet Rıfai Kuyucu &middot; Tüm Hakları Saklıdır
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/vendor/service-worker.js');
    }
    document.addEventListener('DOMContentLoaded', function() {
        const nav = document.getElementById('mainNav');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 80) {
                nav.classList.add('navbar-scrolled');
            } else {
                nav.classList.remove('navbar-scrolled');
            }
        });
    });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
